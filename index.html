<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="body">
    <div class="wrapper">
      <header class="header">
        <div class="header__container">
          <div class="header__inner">
            <a href="#" class="header__logo">
              <svg width="85" height="21">
                <use href="./img/sprite.svg#logo"></use>
              </svg>
            </a>
            <a href="#" class="header__notification">
              <svg width="26" height="26">
                <use href="./img/sprite.svg#notification"></use>
              </svg>
            </a>
          </div>
        </div>
      </header>
      <main class="main">
        <section class="calculate">
          <div class="calculate__container">
            <div class="calculate__inner">
              <h1 class="calculate__title">Автомобили и мотоциклы из Азии</h1>
              <p class="calculate__text">
                Подбор, аукционы <br />и доставка под ключ
              </p>
              <a href="#" class="calculate__button button"
                >Рассчитать стоимость</a
              >
              <img
                src="img/calculate/car.png"
                alt="Авто"
                class="calculate__car"
              />
              <img
                src="img/calculate/background.jpg"
                alt="Фон"
                class="calculate__bg _bgi"
              />
            </div>
          </div>
        </section>
      </main>
      <footer class="footer"></footer>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
