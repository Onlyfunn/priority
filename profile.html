<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <title>Priority Auto - Автомобили и мотоциклы из Азии</title>
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="https://sintez-digital.ru/work/priority/img/favicon/favicon-96x96.png"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://sintez-digital.ru/work/priority/img/favicon/favicon.svg"
    />
    <link
      rel="apple-touch-icon"
      sizes="96x96"
      href="https://sintez-digital.ru/work/priority/img/favicon/favicon-96x96.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="body">
    <div
      class="wrapper"
      style="max-width: 460px; position: relative; margin: 0 auto"
    >
      <header class="header">
        <div class="header__container">
          <div class="header__inner">
            <a href="index.html" class="header__logo">
              <img
                src="img/logo.png"
                alt="Логотип"
                width="85px"
                height="20px"
              />
            </a>
            <a href="#" class="header__notification">
              <svg width="26" height="26">
                <use href="./img/sprite.svg#notification"></use>
              </svg>
            </a>
          </div>
        </div>
      </header>
      <main class="main">
        <form action="#" class="login">
          <div class="login__container">
            <img src="img/login/bg.jpg" alt="" class="login__bg _bgi" />
            <h1 class="login__title title-big">Авторизация</h1>
            <div class="login__subtitle">
              Войдите в свой аккаунт, чтобы продолжить
            </div>
            <img
              src="img/login/car.png"
              width="288px"
              height="150px"
              alt=""
              class="login__car"
            />
            <div class="login__form">
              <div class="login__input">
                <img src="img/login/name-icon.png" alt="" />
                <input
                  type="text"
                  class="login__input-name"
                  placeholder="Ваше имя"
                />
              </div>
              <div class="login__input">
                <img src="img/login/tel-icon.png" alt="" />
                <input
                  type="tel:89999999999"
                  class="login__input login__input-tel"
                  id="phone"
                  placeholder="+7 (999) 999-99-99"
                />
              </div>

              <a href="#" class="login__button button">АВТОРИЗОВАТЬСЯ</a>
            </div>
          </div>
        </form>
      </main>
      <footer class="footer">
        <div class="footer__container" style="margin: 0">
          <div class="footer__body">
            <a href="index.html" class="footer__item">
              <img
                src="img/footer/home.png"
                width="32px"
                height="33px"
                alt=""
              />
            </a>
            <a href="search.html" class="footer__item">
              <img
                src="img/footer/catalog.png"
                width="31px"
                height="34px"
                alt=""
              />
            </a>
            <a href="catalog.html" class="footer__item" id="footer-button">
              <svg class="footer__item" width="86" height="86">
                <use href="./img/sprite.svg#footer"></use>
              </svg>
            </a>

            <a href="auction.html" class="footer__item">
              <img
                src="img/footer/auctions.png"
                width="38px"
                height="34px"
                alt=""
              />
            </a>
            <a href="profile.html" class="footer__item">
              <img src="img/footer/profile.png" width="34" height="34" alt="" />
            </a>
            <img src="img/footer/shadow.png" class="footer__bg _bgi" alt="" />
          </div>
        </div>
      </footer>
    </div>
    <script src="https://unpkg.com/imask"></script>
    <script src="js/script.js"></script>
  </body>
</html>
